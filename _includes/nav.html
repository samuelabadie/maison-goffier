{% assign t = site.data.i18n[page.lang] %}

<nav class="fixed top-0 left-0 right-0 z-40 bg-white/80 backdrop-blur-md">
  <div class="container-mg flex items-center justify-between py-5">
    <a href="/{{ page.lang }}/" class="flex-shrink-0">
      <img src="{{ '/assets/images/logo.png' | relative_url }}" alt="Maison Goffier" class="h-[30px] w-auto">
    </a>

    <!-- Desktop nav -->
    <ul class="hidden md:flex items-center gap-8">
      <li><a href="/{{ page.lang }}/" class="font-serif text-xs uppercase tracking-widest text-dark hover:text-gold transition-colors duration-200">{{ t.nav.home }}</a></li>
      <li><a href="#creations" class="font-serif text-xs uppercase tracking-widest text-dark hover:text-gold transition-colors duration-200">{{ t.nav.creations }}</a></li>
      <li><a href="#maison" class="font-serif text-xs uppercase tracking-widest text-dark hover:text-gold transition-colors duration-200">{{ t.nav.maison }}</a></li>
      <li><a href="#contact" class="font-serif text-xs uppercase tracking-widest text-dark hover:text-gold transition-colors duration-200">{{ t.nav.contact }}</a></li>
    </ul>

    <!-- Hamburger (mobile) -->
    <button id="burger" class="md:hidden flex flex-col justify-center gap-[5px] p-2 -mr-2" aria-label="Ouvrir le menu">
      <span class="block w-5 h-px bg-dark"></span>
      <span class="block w-5 h-px bg-dark"></span>
      <span class="block w-5 h-px bg-dark"></span>
    </button>
  </div>
</nav>

<!-- Mobile menu panel -->
<div id="mobile-menu" class="fixed inset-0 z-50 bg-dark flex flex-col items-center justify-center md:hidden">
  <!-- Bouton fermer -->
  <button id="close-menu" class="absolute top-6 right-6 text-white/50 hover:text-white transition-colors" aria-label="Fermer le menu">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.2">
      <line x1="1" y1="1" x2="21" y2="21"/>
      <line x1="21" y1="1" x2="1" y2="21"/>
    </svg>
  </button>

  <!-- Logo dans le menu mobile -->
  <img src="{{ '/assets/images/logo.png' | relative_url }}" alt="Maison Goffier" class="h-[24px] w-auto mb-12 opacity-60">

  <ul class="flex flex-col items-center gap-8">
    <li><a href="/{{ page.lang }}/" class="font-serif text-2xl uppercase tracking-widest text-white hover:text-gold transition-colors duration-200">{{ t.nav.home }}</a></li>
    <li><a href="#creations" class="font-serif text-2xl uppercase tracking-widest text-white hover:text-gold transition-colors duration-200">{{ t.nav.creations }}</a></li>
    <li><a href="#maison" class="font-serif text-2xl uppercase tracking-widest text-white hover:text-gold transition-colors duration-200">{{ t.nav.maison }}</a></li>
    <li><a href="#contact" class="font-serif text-2xl uppercase tracking-widest text-white hover:text-gold transition-colors duration-200">{{ t.nav.contact }}</a></li>
  </ul>
</div>
