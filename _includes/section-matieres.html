{% assign t = site.data.i18n[page.lang] %}
<section id="creations" class="bg-white py-20 md:py-28">
  <div class="container-mg">
    <span class="block font-sans text-xs uppercase tracking-widest text-gold mb-4">{{ t.section3.label }}</span>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-[40px] mb-4">
      <h2 class="font-serif text-3xl md:text-4xl lg:text-5xl text-dark leading-tight">{{ t.section3.h2 }}</h2>
      <p class="font-sans text-sm text-dark/70 leading-relaxed self-end">{{ t.section3.subtitle }}</p>
    </div>

    <!-- Cards -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-[20px] mt-12">

      <!-- Card 1 -->
      <div>
        <div class="parallax-wrap overflow-hidden mb-5 aspect-[4/5]">
          <img src="{{ '/assets/images/details_2.png' | relative_url }}" alt="{{ t.section3.card1_title }}"
            class="parallax-img w-full h-full object-cover scale-[1.2]">
        </div>
        <h3 class="font-serif text-xl text-dark mb-3">{{ t.section3.card1_title }}</h3>
        <p class="font-sans text-xs text-dark/60 leading-relaxed">{{ t.section3.card1_desc }}</p>
      </div>

      <!-- Card 2 -->
      <div>
        <div class="parallax-wrap overflow-hidden mb-5 aspect-[4/5]">
          <img src="{{ '/assets/images/zoom_pied_12-1.png' | relative_url }}" alt="{{ t.section3.card2_title }}"
            class="parallax-img w-full h-full object-cover scale-[1.2]">
        </div>
        <h3 class="font-serif text-xl text-dark mb-3">{{ t.section3.card2_title }}</h3>
        <p class="font-sans text-xs text-dark/60 leading-relaxed">{{ t.section3.card2_desc }}</p>
      </div>

      <!-- Card 3 -->
      <div>
        <div class="parallax-wrap overflow-hidden mb-5 aspect-[4/5]">
          <img src="{{ '/assets/images/tissus_goffier.png' | relative_url }}" alt="{{ t.section3.card3_title }}"
            class="parallax-img w-full h-full object-cover scale-[1.2]">
        </div>
        <h3 class="font-serif text-xl text-dark mb-3">{{ t.section3.card3_title }}</h3>
        <p class="font-sans text-xs text-dark/60 leading-relaxed">{{ t.section3.card3_desc }}</p>
      </div>

    </div>
  </div>
</section>
