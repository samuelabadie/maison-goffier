{% assign t = site.data.i18n[page.lang] %}
<section id="hero-section" class="relative min-h-[90vh] flex flex-col overflow-hidden bg-[#F5F3EF]">

  <!-- Image de fond -->
  <img id="hero-bg" src="{{ '/assets/images/hero-bg.png' | relative_url }}" alt=""
    class="hero-parallax absolute top-0 left-1/2 -translate-x-1/2 h-full max-w-none pointer-events-none"
    aria-hidden="true">

  <!-- Contenu par dessus l'image (z-10) -->
  <div class="relative z-10 flex-1 flex flex-col items-center justify-center pt-24">

    <!-- MAISON GOFFIER + PARIS -->
    <div class="text-center mb-4 md:mb-12">
      <span id="hero-brand" class="block font-serif tracking-[0.15em] text-dark" style="font-size: clamp(38px, 8vw, 68px); line-height: 1.1;">{{ t.hero.brand }}</span>
      <span id="hero-location" class="block font-serif text-lg md:text-xl tracking-[0.5em] text-dark mt-1">{{ t.hero.location }}</span>
    </div>

    <!-- Bande blur pleine largeur -->
    <div id="hero-band" class="w-full border-t border-b border-white/30 backdrop-blur-[10px] bg-white/10 py-5 md:py-10">
      <div class="container-mg text-center">
        <h1 id="hero-h1" class="font-serif uppercase text-dark mx-auto mb-6" style="font-size: 26px; line-height: 110%; letter-spacing: 1px;">{{ t.hero.h1 }}</h1>
        <div id="hero-made" class="flex items-center justify-center gap-3 mb-3">
          <span class="block w-8 h-px bg-gold"></span>
          <span class="font-sans text-xs uppercase tracking-widest text-dark">{{ t.hero.made_in }}</span>
          <span class="block w-8 h-px bg-gold"></span>
        </div>
        <!-- Drapeau français -->
        <div id="hero-flag" class="flex justify-center">
          <div class="flex" style="width: 42px; height: 3px;">
            <div style="flex: 1; background-color: #002395;"></div>
            <div style="flex: 1; background-color: #EDEDED;"></div>
            <div style="flex: 1; background-color: #ED2939;"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- CTA en dehors de la bande -->
    <div id="hero-cta" class="text-center mt-8">
      <a href="#creations" class="btn-primary">{{ t.hero.cta }}</a>
    </div>
  </div>

  <!-- Baseline par dessus la photo -->
  <div id="hero-baseline" class="relative z-10 text-center py-6">
    <span class="font-serif italic text-base md:text-lg text-dark/80 tracking-wide">{{ t.hero.baseline }}</span>
  </div>

</section>
